name: Build, Test, and Publish

permissions:
  contents: write

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Build
      run: go build ./...

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: Release v${{ steps.get_version.outputs.VERSION }}
        body: |
          ## Helix Connect Go SDK v${{ steps.get_version.outputs.VERSION }}

          ### Installation
          ```bash
          go get github.com/helix-tools/sdk-go/v2
          ```
        draft: false
        prerelease: false
        token: ${{ secrets.GITHUB_TOKEN }}

  # Triggers the production E2E suite in helix-tools/e2e on merge to main. Requires the org/repo secret GH_PAT (a PAT allowed to dispatch to helix-tools/e2e).
  notify-e2e:
    name: Notify E2E Suite
    needs: [ build ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger E2E suite
        run: |
          curl -sSf -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/helix-tools/e2e/dispatches \
            -d '{"event_type":"e2e-trigger","client_payload":{"source":"sdk-go","sha":"${{ github.sha }}"}}'